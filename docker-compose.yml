version: '3.9'

# ---------------------------------------------------------------------------
# SRE Agent Platform — Local Development docker-compose
#
# Services:
#   api        - FastAPI application (LangGraph orchestrator)
#   chromadb   - ChromaDB vector store (runbook embeddings)
#   prometheus - Metrics scraping and alerting
#   grafana    - Metrics dashboards
#   k8s-mcp    - Kubernetes MCP server
#   aws-mcp    - AWS MCP server
#   azure-mcp  - Azure MCP server
#   snow-mcp   - ServiceNow MCP server
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f api
#   docker-compose down -v
# ---------------------------------------------------------------------------

networks:
  sre-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  chromadb-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  grafana-provisioning:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # FastAPI Application — SRE Agent Platform
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: sre-agent-platform:latest
    container_name: sre-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - K8S_MCP_URL=http://k8s-mcp:8001
      - AWS_MCP_URL=http://aws-mcp:8002
      - AZURE_MCP_URL=http://azure-mcp:8003
      - SNOW_MCP_URL=http://snow-mcp:8004
      - LOG_LEVEL=INFO
    volumes:
      - ./rag:/app/rag:ro
      - ./agents:/app/agents:ro
      - ./api:/app/api:ro
      - ./a2a:/app/a2a:ro
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sre-net
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8000"
      - "prometheus.path=/metrics"

  # ---------------------------------------------------------------------------
  # ChromaDB — Vector Store for RAG Runbooks
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: sre-chromadb
    restart: unless-stopped
    ports:
      - "8100:8000"    # Exposed on 8100 to avoid conflict with API on 8000
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - ANONYMIZED_TELEMETRY=FALSE
      - ALLOW_RESET=TRUE
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chromadb-data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - sre-net

  # ---------------------------------------------------------------------------
  # Prometheus — Metrics Collection and Alerting
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sre-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sre-net

  # ---------------------------------------------------------------------------
  # Grafana — Metrics Dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: sre-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/sre-overview.json
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - sre-net

  # ---------------------------------------------------------------------------
  # Kubernetes MCP Server — kubectl operations via Model Context Protocol
  # ---------------------------------------------------------------------------
  k8s-mcp:
    build:
      context: ./mcp_servers
      dockerfile: Dockerfile.k8s
    image: sre-k8s-mcp:latest
    container_name: sre-k8s-mcp
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - MCP_SERVER_NAME=kubernetes-mcp
      - MCP_SERVER_PORT=8001
      - KUBECONFIG=/root/.kube/config
      - LOG_LEVEL=INFO
    volumes:
      - ${KUBECONFIG_PATH:-~/.kube}:/root/.kube:ro
      - ./mcp_servers:/app/mcp_servers:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sre-net

  # ---------------------------------------------------------------------------
  # AWS MCP Server — AWS API operations via Model Context Protocol
  # ---------------------------------------------------------------------------
  aws-mcp:
    build:
      context: ./mcp_servers
      dockerfile: Dockerfile.aws
    image: sre-aws-mcp:latest
    container_name: sre-aws-mcp
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - MCP_SERVER_NAME=aws-mcp
      - MCP_SERVER_PORT=8002
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - LOG_LEVEL=INFO
    volumes:
      - ${AWS_CONFIG_DIR:-~/.aws}:/root/.aws:ro
      - ./mcp_servers:/app/mcp_servers:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sre-net

  # ---------------------------------------------------------------------------
  # Azure MCP Server — Azure API operations via Model Context Protocol
  # ---------------------------------------------------------------------------
  azure-mcp:
    build:
      context: ./mcp_servers
      dockerfile: Dockerfile.azure
    image: sre-azure-mcp:latest
    container_name: sre-azure-mcp
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - MCP_SERVER_NAME=azure-mcp
      - MCP_SERVER_PORT=8003
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID}
      - LOG_LEVEL=INFO
    volumes:
      - ./mcp_servers:/app/mcp_servers:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sre-net

  # ---------------------------------------------------------------------------
  # ServiceNow MCP Server — ITSM operations via Model Context Protocol
  # ---------------------------------------------------------------------------
  snow-mcp:
    build:
      context: ./mcp_servers
      dockerfile: Dockerfile.snow
    image: sre-snow-mcp:latest
    container_name: sre-snow-mcp
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      - MCP_SERVER_NAME=servicenow-mcp
      - MCP_SERVER_PORT=8004
      - SNOW_INSTANCE=${SNOW_INSTANCE}
      - SNOW_USERNAME=${SNOW_USERNAME}
      - SNOW_PASSWORD=${SNOW_PASSWORD}
      - LOG_LEVEL=INFO
    volumes:
      - ./mcp_servers:/app/mcp_servers:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sre-net

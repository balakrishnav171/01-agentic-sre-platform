# Default values for agentic-sre Helm chart

replicaCount: 2

image:
  repository: ghcr.io/balakrishna-valluri-bala/agentic-sre-platform
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: sre-agent.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: sre-agent-tls
      hosts:
        - sre-agent.example.com

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: ["agentic-sre"]
          topologyKey: kubernetes.io/hostname

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

env:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  CHROMA_HOST: "chromadb"
  CHROMA_PORT: "8000"

envFromSecret:
  - secretName: sre-platform-secrets
    keys:
      - OPENAI_API_KEY
      - DATADOG_API_KEY
      - DATADOG_APP_KEY
      - SERVICENOW_INSTANCE_URL
      - SERVICENOW_USERNAME
      - SERVICENOW_PASSWORD

# MCP server configs
mcpServers:
  kubernetes:
    enabled: true
    port: 8001
  aws:
    enabled: true
    port: 8002
    region: "us-east-1"
  azure:
    enabled: true
    port: 8003
  servicenow:
    enabled: true
    port: 8004

# ChromaDB config
chromadb:
  enabled: true
  image: chromadb/chroma:latest
  port: 8000
  persistence:
    enabled: true
    size: 10Gi

prometheus:
  enabled: true

grafana:
  enabled: true
  adminPassword: "changeme"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

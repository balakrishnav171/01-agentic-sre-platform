apiVersion: v2
name: agentic-sre
description: Agentic SRE Platform — Multi-agent Kubernetes remediation system using LangGraph, MCP, and A2A
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - sre
  - ai
  - agents
  - kubernetes
  - observability
  - langgraph
  - mcp
home: https://github.com/balakrishna-valluri-bala/agentic-sre-platform
sources:
  - https://github.com/balakrishna-valluri-bala/agentic-sre-platform
maintainers:
  - name: Balakrishna V
    email: balakrishna@example.com
    url: https://github.com/balakrishna-valluri-bala
dependencies:
  - name: prometheus
    version: "25.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "7.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled

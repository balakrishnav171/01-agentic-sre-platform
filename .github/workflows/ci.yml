name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"
  TERRAFORM_VERSION: "1.8.0"

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 bandit pytest-cov

      - name: Black formatting check
        run: black --check --diff .

      - name: Flake8 linting
        run: flake8 . --max-line-length=100 --exclude=.git,__pycache__,.venv,infrastructure

      - name: Bandit security scan
        run: bandit -r agents/ api/ mcp_servers/ rag/ a2a/ -ll

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          OPENAI_API_KEY: "test-key"
          CHROMA_HOST: "localhost"
          CHROMA_PORT: "8000"
          ENVIRONMENT: "test"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, azure]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infrastructure/${{ matrix.cloud }}/
        continue-on-error: true

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: infrastructure/${{ matrix.cloud }}

      - name: Terraform validate
        run: terraform validate
        working-directory: infrastructure/${{ matrix.cloud }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint
        run: tflint --recursive
        working-directory: infrastructure/${{ matrix.cloud }}

  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: agentic-sre:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: agentic-sre:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/agentic-sre-platform:latest
            ghcr.io/${{ github.repository_owner }}/agentic-sre-platform:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
